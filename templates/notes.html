<!DOCTYPE html>
<html>
<head>
    <title>Secure Notes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">🔐 Secure Notes</h2>

    <!-- SAVE NOTE -->
    <div class="card p-4 bg-secondary">
        <form method="POST">
            <div class="input-group">
                <input type="text" name="note" class="form-control" placeholder="Write your note..." required>
                <button class="btn btn-success">Save</button>
            </div>
        </form>
    </div>

    <!-- SEARCH -->
    <form method="GET" class="mt-3">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search notes...">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- NOTES LIST -->
    <div class="mt-4">
        <h4>Your Notes</h4>

        <ul class="list-group">
            {% for id, n in notes %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    
                    <span>{{ n }}</span>

                    <div>
                        <a href="/edit/{{ id }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete/{{ id }}" class="btn btn-danger btn-sm">Delete</a>
                    </div>

                </li>
            {% endfor %}
        </ul>

    </div>

    <!-- LOGOUT -->
    <div class="text-center mt-4">
        <a href="/logout" class="btn btn-warning">Logout</a>
    </div>

</div>

</body>
</html>
