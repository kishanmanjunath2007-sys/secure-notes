<!DOCTYPE html>
<html>
<head>
    <title>Your Notes</title>
</head>
<body>

    <h2>Welcome {{ session['user'] }}</h2>

    <h3>Your Notes</h3>

    <form method="POST">
        <input type="text" name="note" placeholder="Write note" required>
        <button type="submit">Save</button>
    </form>

    <br>

    <ul>
        {% for n in notes %}
            <li>{{ n }}</li>
        {% endfor %}
    </ul>

    <br>

    <a href="/logout">Logout</a>

</body>
</html>
