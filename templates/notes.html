<!DOCTYPE html>
<html>
<head>
    <title>Your Notes</title>
</head>
<body>

<h2>Welcome {{ session['user'] }}</h2>

<form method="POST">
    <input type="text" name="note" placeholder="Write note" required>
    <button type="submit">Save</button>
</form>

<ul>
    {% for id, n in notes %}
        <li>
            {{ n }}
            <a href="/delete/{{ id }}">❌ Delete</a>
        </li>
    {% endfor %}
</ul>

<br>
<a href="/logout">Logout</a>

</body>
</html>
